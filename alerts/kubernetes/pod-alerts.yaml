apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: kustomize
spec:
  groups:
    - name: pod.rules
      interval: 1m
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} has restarted {{ $value | printf \"%.0f\" }} times in the last 15 minutes."
            runbook_url: "https://github.com/your-org/SRE-monitoring/blob/main/docs/runbooks/pod-crash-loop.md"

        - alert: PodNotReady
          expr: |
            kube_pod_status_phase{phase=~"Pending|Unknown|Failed"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for 15m"
            description: "Pod has been in {{ $labels.phase }} state for more than 15 minutes."
            runbook_url: "https://github.com/your-org/SRE-monitoring/blob/main/docs/runbooks/pod-not-ready.md"

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} OOM-killed"
            description: "Container was OOM-killed. Consider increasing memory limits."

        - alert: PodHighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{container!="", container!="POD"}
              / on(namespace, pod, container)
              kube_pod_container_resource_limits{resource="memory"}
            ) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} memory usage > 90%"
            description: "Memory usage is at {{ $value | humanizePercentage }} of limit."

        - alert: PodHighCPUThrottle
          expr: |
            (
              rate(container_cpu_cfs_throttled_seconds_total[5m])
              / rate(container_cpu_cfs_periods_total[5m])
            ) > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.container }} in {{ $labels.namespace }} CPU-throttled > 80%"
            description: "CPU throttling at {{ $value | humanizePercentage }}. Consider raising CPU limits."
