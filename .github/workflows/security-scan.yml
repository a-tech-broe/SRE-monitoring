name: Security Scan

on:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"  # weekly Monday 4AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Checkov (Terraform + K8s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          skip_check: "CKV_AWS_115,CKV_AWS_116,CKV_K8S_8,CKV_K8S_9,CKV2_AWS_64,CKV_AWS_38,CKV_AWS_39,CKV2_AWS_62,CKV_AWS_144,CKV_AWS_18,CKV2_AWS_12,CKV_AWS_356"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sLo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts="--all" --redact --exit-code 1

  trivy:
    name: Trivy IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
