name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options: [dev, prod, all]
      confirm_destroy:
        description: "Type DESTROY to confirm (required)"
        required: true
      destroy_bootstrap:
        description: "Also destroy bootstrap (OIDC provider + CI roles) — cuts all GHA AWS access"
        required: false
        type: boolean
        default: false

# No push/PR triggers — this workflow must always be manually invoked.
permissions:
  contents: read

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ── Guard: reject invalid confirmation before any destructive work ─────────
  guard:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check DESTROY confirmation text
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "DESTROY" ]]; then
            echo "::error::Confirmation text must be exactly: DESTROY"
            echo "::error::Got: '${{ inputs.confirm_destroy }}'"
            exit 1
          fi
          echo "Confirmation accepted. Target: ${{ inputs.environment }}"

  # ── Destroy dev environment ────────────────────────────────────────────────
  destroy-dev:
    name: Destroy dev
    runs-on: ubuntu-latest
    environment: dev
    needs: guard
    if: >
      needs.guard.result == 'success' &&
      (inputs.environment == 'dev' || inputs.environment == 'all')
    env:
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: azure/setup-helm@v4

      - name: Teardown Kubernetes (dev)
        run: |
          set -euo pipefail

          if ! aws eks update-kubeconfig --name observability-dev --region "$AWS_REGION" 2>/dev/null; then
            echo "::warning::Could not connect to observability-dev. Cluster may already be gone."
          else
            echo "Deleting Ingress resources to trigger ALB cleanup..."
            kubectl delete ingress --all-namespaces --all --ignore-not-found --timeout=60s || true

            echo "Waiting up to 120s for ALBs to be released..."
            DEADLINE=$((SECONDS + 120))
            while [[ $SECONDS -lt $DEADLINE ]]; do
              COUNT=$(aws resourcegroupstaggingapi get-resources \
                --tag-filters "Key=kubernetes.io/cluster/observability-dev,Values=owned" \
                --resource-type-filters "elasticloadbalancing:loadbalancer" \
                --region "$AWS_REGION" \
                --query 'ResourceTagMappingList | length(@)' \
                --output text 2>/dev/null || echo "0")
              [[ "$COUNT" == "0" || "$COUNT" == "None" ]] && { echo "No ALBs remaining."; break; }
              echo "  $COUNT ALB(s) still being deleted... (${SECONDS}s)"
              sleep 10
            done

            echo "Uninstalling Helm releases..."
            helm uninstall kube-prometheus --namespace monitoring 2>/dev/null || true
            helm uninstall loki             --namespace logging    2>/dev/null || true

            echo "Deleting Kustomize manifests..."
            kubectl delete -k kubernetes/overlays/dev --ignore-not-found --timeout=120s || true

            echo "Deleting namespaces (triggers PVC/PV cleanup)..."
            kubectl delete namespace monitoring --ignore-not-found --timeout=180s || true
            kubectl delete namespace logging    --ignore-not-found --timeout=180s || true
          fi

      - name: Empty Loki S3 bucket (dev)
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="observability-dev-loki-chunks-$ACCOUNT_ID"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET not found — skipping."
            exit 0
          fi

          echo "Emptying versioned bucket s3://$BUCKET ..."
          TOTAL=0
          TMP=$(mktemp)

          while true; do
            PAGE=$(aws s3api list-object-versions \
              --bucket "$BUCKET" --max-items 1000 --output json 2>/dev/null || echo '{}')

            PAYLOAD=$(echo "$PAGE" | jq -c '{
              Objects: [
                (.Versions     // [])[] | {Key: .Key, VersionId: .VersionId},
                (.DeleteMarkers // [])[] | {Key: .Key, VersionId: .VersionId}
              ],
              Quiet: true
            }')

            COUNT=$(echo "$PAYLOAD" | jq '.Objects | length')
            [[ "$COUNT" -eq 0 ]] && break

            echo "$PAYLOAD" > "$TMP"
            aws s3api delete-objects --bucket "$BUCKET" --delete "file://$TMP" --output json > /dev/null
            TOTAL=$((TOTAL + COUNT))
            echo "Deleted $TOTAL versions so far..."
          done

          rm -f "$TMP"
          echo "Bucket emptied ($TOTAL versions removed)."

      - name: Terraform destroy (dev)
        working-directory: terraform/environments/dev
        run: |
          terraform init -input=false -reconfigure
          terraform destroy -auto-approve -input=false

      - name: Verify remaining resources (dev)
        if: always()
        run: |
          echo "=== Remaining resources check (dev) ==="
          echo "EKS clusters:"
          aws eks list-clusters --region "$AWS_REGION" --output json | \
            jq -r '.clusters[] | select(contains("observability-dev"))' || echo "none"
          echo "VPCs:"
          aws ec2 describe-vpcs --region "$AWS_REGION" \
            --filters "Name=tag:Environment,Values=dev" "Name=tag:Project,Values=observability-platform" \
            --query 'Vpcs[*].VpcId' --output text || echo "none"
          echo "AMP workspaces:"
          aws amp list-workspaces --region "$AWS_REGION" \
            --query "workspaces[?contains(alias,'observability-dev')].alias" \
            --output text || echo "none"

  # ── Destroy prod environment ───────────────────────────────────────────────
  destroy-prod:
    name: Destroy prod
    runs-on: ubuntu-latest
    environment: prod
    needs: [guard, destroy-dev]
    if: >
      always() &&
      needs.guard.result == 'success' &&
      (inputs.environment == 'prod' || inputs.environment == 'all') &&
      (needs.destroy-dev.result == 'success' || needs.destroy-dev.result == 'skipped')
    env:
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: azure/setup-helm@v4

      - name: Teardown Kubernetes (prod)
        run: |
          set -euo pipefail
          # Prod has a private-only API endpoint (endpoint_public_access = false).
          # GitHub Actions runners cannot reach it. If kubectl fails, warn and
          # continue — Terraform destroy will surface any leftover dependencies.
          if ! aws eks update-kubeconfig --name observability-prod --region "$AWS_REGION" 2>/dev/null; then
            echo "::warning::Could not connect to observability-prod. Cluster may already be gone."
          elif ! kubectl cluster-info 2>/dev/null; then
            echo "::warning::API server unreachable (private endpoint). Skipping K8s teardown."
            echo "::warning::Delete ALBs and EBS volumes manually from within the VPC before"
            echo "::warning::running this workflow, or terraform destroy will fail on the VPC."
          else
            echo "Deleting Ingress resources to trigger ALB cleanup..."
            kubectl delete ingress --all-namespaces --all --ignore-not-found --timeout=60s || true

            echo "Waiting up to 120s for ALBs to be released..."
            DEADLINE=$((SECONDS + 120))
            while [[ $SECONDS -lt $DEADLINE ]]; do
              COUNT=$(aws resourcegroupstaggingapi get-resources \
                --tag-filters "Key=kubernetes.io/cluster/observability-prod,Values=owned" \
                --resource-type-filters "elasticloadbalancing:loadbalancer" \
                --region "$AWS_REGION" \
                --query 'ResourceTagMappingList | length(@)' \
                --output text 2>/dev/null || echo "0")
              [[ "$COUNT" == "0" || "$COUNT" == "None" ]] && { echo "No ALBs remaining."; break; }
              echo "  $COUNT ALB(s) still being deleted... (${SECONDS}s)"
              sleep 10
            done

            echo "Uninstalling Helm releases..."
            helm uninstall kube-prometheus --namespace monitoring 2>/dev/null || true
            helm uninstall loki             --namespace logging    2>/dev/null || true

            echo "Deleting Kustomize manifests..."
            kubectl delete -k kubernetes/overlays/prod --ignore-not-found --timeout=120s || true

            echo "Deleting namespaces..."
            kubectl delete namespace monitoring --ignore-not-found --timeout=180s || true
            kubectl delete namespace logging    --ignore-not-found --timeout=180s || true
          fi

      - name: Empty Loki S3 bucket (prod)
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="observability-prod-loki-chunks-$ACCOUNT_ID"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET not found — skipping."
            exit 0
          fi

          echo "Emptying versioned bucket s3://$BUCKET ..."
          TOTAL=0
          TMP=$(mktemp)

          while true; do
            PAGE=$(aws s3api list-object-versions \
              --bucket "$BUCKET" --max-items 1000 --output json 2>/dev/null || echo '{}')

            PAYLOAD=$(echo "$PAGE" | jq -c '{
              Objects: [
                (.Versions     // [])[] | {Key: .Key, VersionId: .VersionId},
                (.DeleteMarkers // [])[] | {Key: .Key, VersionId: .VersionId}
              ],
              Quiet: true
            }')

            COUNT=$(echo "$PAYLOAD" | jq '.Objects | length')
            [[ "$COUNT" -eq 0 ]] && break

            echo "$PAYLOAD" > "$TMP"
            aws s3api delete-objects --bucket "$BUCKET" --delete "file://$TMP" --output json > /dev/null
            TOTAL=$((TOTAL + COUNT))
            echo "Deleted $TOTAL versions so far..."
          done

          rm -f "$TMP"
          echo "Bucket emptied ($TOTAL versions removed)."

      - name: Terraform destroy (prod)
        working-directory: terraform/environments/prod
        run: |
          terraform init -input=false -reconfigure
          terraform destroy -auto-approve -input=false

      - name: Verify remaining resources (prod)
        if: always()
        run: |
          echo "=== Remaining resources check (prod) ==="
          echo "EKS clusters:"
          aws eks list-clusters --region "$AWS_REGION" --output json | \
            jq -r '.clusters[] | select(contains("observability-prod"))' || echo "none"
          echo "VPCs:"
          aws ec2 describe-vpcs --region "$AWS_REGION" \
            --filters "Name=tag:Environment,Values=prod" "Name=tag:Project,Values=observability-platform" \
            --query 'Vpcs[*].VpcId' --output text || echo "none"
          echo "AMP workspaces:"
          aws amp list-workspaces --region "$AWS_REGION" \
            --query "workspaces[?contains(alias,'observability-prod')].alias" \
            --output text || echo "none"

  # ── Optionally destroy bootstrap (OIDC provider + CI roles) ───────────────
  destroy-bootstrap:
    name: Destroy bootstrap
    runs-on: ubuntu-latest
    needs: [guard, destroy-dev, destroy-prod]
    if: >
      always() &&
      inputs.destroy_bootstrap == true &&
      needs.guard.result == 'success' &&
      (needs.destroy-dev.result  == 'success' || needs.destroy-dev.result  == 'skipped') &&
      (needs.destroy-prod.result == 'success' || needs.destroy-prod.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform destroy (bootstrap)
        working-directory: terraform/bootstrap
        run: |
          terraform init -input=false -reconfigure
          terraform destroy -auto-approve -input=false
          echo "::warning::Bootstrap destroyed. GitHub Actions workflows no longer have AWS access."
